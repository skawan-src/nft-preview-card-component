<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main class="page-wrapper">
      <section>
        <img src="assets/images/image-equilibrium.jpg" alt="" />
        <div class="informacoes">
          <p>Equilibrium #3429</p>
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <div class="valores">
            <p><img src="assets/images/icon-ethereum.svg" alt="" />0.041 ETH</p>
            <p><img src="assets/images/icon-clock.svg" alt="" />3 days left</p>
          </div>
          <hr />
          <p class="avatar">
            <img src="assets/images/pkimg.png" alt="" />Creation of
            <strong>Pedro Kawan</strong>
          </p>
        </div>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/skawan-src">Pedro Kawan</a>.
    </footer>
  </body>
</html>
